<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>scene probe</title>
<style>body { margin: 0; background: #2a2e36; overflow: hidden; }</style>
<script type="importmap">{ "imports": { "three": "../js/vendor/three.module.js" } }</script>
</head>
<body>
<script type="module">
import * as THREE from '../js/vendor/three.module.js';
import { GLTFLoader } from '../js/vendor/GLTFLoader.js';

const q = new URLSearchParams(location.search);
const WHICH = q.get('m') || 'castle';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
// ?clipy=5 剖切：只显示 y<clipy 的部分（看内院净空的平面轮廓）
const clipY = parseFloat(q.get('clipy') || 'NaN');
if (!isNaN(clipY)) {
  renderer.localClippingEnabled = true;
  renderer.clippingPlanes = [new THREE.Plane(new THREE.Vector3(0, -1, 0), clipY)];
}
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x30343c);
const cam = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.05, 2000);
scene.add(new THREE.HemisphereLight(0xd8dee8, 0x44503f, 1.5));
const sun = new THREE.DirectionalLight(0xfff2dd, 1.3);
sun.position.set(30, 60, 40);
scene.add(sun);
const sun2 = new THREE.DirectionalLight(0xcfd8ff, 0.5);
sun2.position.set(-40, 30, -50);
scene.add(sun2);

const loader = new GLTFLoader();
const g = await loader.loadAsync(`../assets/models/scene/${WHICH}.glb`);
const model = g.scene;
// ?ray=1 在 raw 坐标打几条垂直射线，报告命中的 mesh 名（定位碎片归属）
if (q.get('ray')) {
  model.updateMatrixWorld(true);
  const rc = new THREE.Raycaster();
  const hits = [];
  const pts = [[0.06, 7.9], [0.5, 8.3], [-0.4, 7.5], [1.0, 7.0], [-1.0, 8.5], [0.06, 7.9]];
  for (const [rx, rz] of pts) {
    rc.set(new THREE.Vector3(rx, 20, rz), new THREE.Vector3(0, -1, 0));
    const hs = rc.intersectObject(model, true).slice(0, 4);
    hits.push({ at: [rx, rz], hit: hs.map((h) => `${h.object.name}@y${h.point.y.toFixed(2)}`) });
  }
  console.log('RAYRESULT', JSON.stringify(hits));
  window.__ray = hits;
}
// ?meshes=6,7 只显示指定 mesh（按 traverse 顺序索引）；?keepbox=x0,x1,y0,y1,z0,z1 三角心框选保留
const mfilter = q.get('meshes');
if (mfilter) {
  const keep = new Set(mfilter.split(',').map(Number));
  let mi = 0;
  model.traverse((o) => { if (o.isMesh && !keep.has(mi++)) o.visible = false; });
}
const kb = q.get('keepbox');
if (kb) {
  const [x0, x1, y0, y1, z0, z1] = kb.split(',').map(Number);
  model.updateMatrixWorld(true);
  const vv = new THREE.Vector3();
  let kept = 0, total = 0;
  model.traverse((o) => {
    if (!o.isMesh || !o.geometry.index) return;
    const pos = o.geometry.attributes.position;
    const idx = o.geometry.index.array;
    const keepIdx = [];
    for (let i = 0; i < idx.length; i += 3) {
      total++;
      let cx = 0, cy = 0, cz = 0;
      for (let k = 0; k < 3; k++) {
        vv.fromBufferAttribute(pos, idx[i + k]).applyMatrix4(o.matrixWorld);
        cx += vv.x / 3; cy += vv.y / 3; cz += vv.z / 3;
      }
      if (cx > x0 && cx < x1 && cy > y0 && cy < y1 && cz > z0 && cz < z1) { kept++; keepIdx.push(idx[i], idx[i + 1], idx[i + 2]); }
    }
    o.geometry.setIndex(keepIdx);
  });
  console.log('KEEPBOX kept', kept, '/', total);
  window.__kept = [kept, total];
}
scene.add(model);
model.updateMatrixWorld(true);
const bb = new THREE.Box3().setFromObject(model);
const size = bb.getSize(new THREE.Vector3());
const center = bb.getCenter(new THREE.Vector3());
console.log('WORLD_BBOX', JSON.stringify({ min: bb.min, max: bb.max, size, center }));
// 每 mesh 包围盒（找门窗/分层结构用）
const perMesh = [];
model.traverse((o) => {
  if (o.isMesh) {
    const b = new THREE.Box3().setFromObject(o);
    perMesh.push({ n: o.name, tris: o.geometry.index ? o.geometry.index.count / 3 : 0, min: b.min.toArray().map(v=>+v.toFixed(1)), max: b.max.toArray().map(v=>+v.toFixed(1)) });
  }
});
window.__meshes = perMesh;
window.__bbox = { min: bb.min.toArray(), max: bb.max.toArray(), size: size.toArray(), center: center.toArray() };

const axes = new THREE.AxesHelper(Math.max(size.x, size.z) * 0.3);
scene.add(axes);
const grid = new THREE.GridHelper(Math.max(size.x, size.z) * 1.4, 28, 0x888888, 0x555555);
grid.position.y = bb.min.y;
scene.add(grid);

// 视角：?v=front|back|left|right|top|inside|iso  （front = +Z 看向 -Z）
const V = q.get('v') || 'iso';
const R = Math.max(size.x, size.y, size.z);
const cy = center.y;
const views = {
  iso:   [center.x + R * 0.9, cy + R * 0.7, center.z + R * 0.9],
  front: [center.x, cy + size.y * 0.15, center.z + R * 1.2],
  back:  [center.x, cy + size.y * 0.15, center.z - R * 1.2],
  left:  [center.x - R * 1.2, cy + size.y * 0.15, center.z],
  right: [center.x + R * 1.2, cy + size.y * 0.15, center.z],
  top:   [center.x, bb.max.y + R * 0.9, center.z],
  inside:[center.x, bb.min.y + 1.6, center.z],
  c_posz: [center.x, bb.min.y + 1.7, center.z],
  c_negz: [center.x, bb.min.y + 1.7, center.z],
  c_posx: [center.x, bb.min.y + 1.7, center.z],
  c_negx: [center.x, bb.min.y + 1.7, center.z],
  in_posz: [center.x, bb.min.y + 1.7, bb.max.z - 1.0],
  in_negz: [center.x, bb.min.y + 1.7, bb.min.z + 1.0],
  in_posx: [bb.max.x - 1.0, bb.min.y + 1.7, center.z],
  in_negx: [bb.min.x + 1.0, bb.min.y + 1.7, center.z],
  close: [center.x + R * 0.45, cy + R * 0.35, center.z + R * 0.45],
};
if (V === 'top') { cam.up.set(0, 0, -1); }
cam.position.set(...(views[V] || views.iso));
// 内侧视角朝对面墙看；c_* 从中心看向四面墙
const lookT = { in_posz: [center.x, bb.min.y + 1.5, bb.min.z], in_negz: [center.x, bb.min.y + 1.5, bb.max.z], in_posx: [bb.min.x, bb.min.y + 1.5, center.z], in_negx: [bb.max.x, bb.min.y + 1.5, center.z],
  c_posz: [center.x, bb.min.y + 1.6, bb.max.z], c_negz: [center.x, bb.min.y + 1.6, bb.min.z], c_posx: [bb.max.x, bb.min.y + 1.6, center.z], c_negx: [bb.min.x, bb.min.y + 1.6, center.z] };
const lt = lookT[V] || [center.x, V === 'inside' ? bb.min.y + 1.5 : cy, center.z];
cam.lookAt(...lt);
renderer.render(scene, cam);
window.__ready = true;
</script>
</body>
</html>
