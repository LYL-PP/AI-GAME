<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>char gallery</title>
<style>
  body { margin: 0; background: #2a2e36; overflow: hidden; }
  #labels { position: fixed; left: 0; right: 0; bottom: 0; display: grid;
    grid-template-columns: repeat(6, 1fr); z-index: 9; pointer-events: none; }
  #labels span { color: #e8ddc9; font: 22px serif; text-align: center; }
</style>
<script type="importmap">{ "imports": { "three": "../js/vendor/three.module.js" } }</script>
</head>
<body>
<div id="labels"></div>
<script type="module">
import * as THREE from '../js/vendor/three.module.js';
import { GLTFLoader } from '../js/vendor/GLTFLoader.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2e36);
const cam = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
scene.add(new THREE.HemisphereLight(0xcfd6dd, 0x44503f, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(4, 8, 6);
scene.add(sun);

const loader = new GLTFLoader();
const ids = (new URLSearchParams(location.search).get('set') || 'abcdefghijklmnopqr').split('');
const labelsEl = document.getElementById('labels');

const spans = labelsEl.children;

const done = [];
for (let i = 0; i < ids.length; i++) {
  const col = i % 6, row = (i / 6) | 0;
  const g = await loader.loadAsync(`../assets/models/characters/character-${ids[i]}.glb`);
  const m = g.scene;
  const x = (col - 2.5) * 2.2, z = -row * 3.2;
  m.position.set(x, 0, z);
  scene.add(m);
  const cv = document.createElement('canvas');
  cv.width = 128; cv.height = 48;
  const c = cv.getContext('2d');
  c.fillStyle = '#e8ddc9'; c.font = '40px serif'; c.textAlign = 'center';
  c.fillText(ids[i], 64, 38);
  const tex = new THREE.CanvasTexture(cv);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
  sp.scale.set(1.3, 0.5, 1);
  sp.position.set(x, 2.6, z);
  scene.add(sp);
  done.push(ids[i]);
}
document.title = 'gallery ready: ' + done.length;
cam.position.set(0, 3.6, 9.5);
cam.lookAt(0, 1.0, -1.2);
renderer.render(scene, cam);
window.__ready = true;
</script>
</body>
</html>
